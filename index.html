<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/assets/images/hero_bg_poster.jpg" fetchpriority="high" />
    <link rel="preload" as="video" href="/assets/images/hero_bg_video-fast.mp4" type="video/mp4" fetchpriority="high" />
    <link
      rel="preload"
      as="image"
      href="/assets/images/tx_multi_services_group-160.webp"
      imagesrcset="/assets/images/tx_multi_services_group-160.webp 160w, /assets/images/tx_multi_services_group-320.webp 320w"
      imagesizes="(min-width: 1024px) 80px, (min-width: 640px) 64px, 48px"
      fetchpriority="high"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0a0a;
      }

      #root {
        min-height: 100vh;
        background: #0a0a0a;
      }

      .initial-hero {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: #0a0a0a url("/assets/images/hero_bg_poster.jpg") center / cover no-repeat;
      }

      .initial-hero video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(8px);
        transform: scale(1.05);
      }

      .initial-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to top, #0a0a0a 0%, transparent 24%),
          rgba(0, 0, 0, 0.18);
      }

      .initial-nav {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 1rem clamp(1rem, 6vw, 7rem);
        color: white;
        font: 700 1.25rem Inter, ui-sans-serif, system-ui, sans-serif;
      }

      .initial-nav img {
        width: clamp(3rem, 7vw, 5rem);
        height: clamp(3rem, 7vw, 5rem);
        object-fit: contain;
      }
    </style>
    <title>Texas Gateway Group | Premium US Visas & Legal Advisory</title>
  </head>
  <body>
    <div id="root">
      <div class="initial-hero" aria-hidden="true">
        <video
          src="/assets/images/hero_bg_video-fast.mp4"
          poster="/assets/images/hero_bg_poster.jpg"
          muted
          autoplay
          playsinline
          preload="auto"
        ></video>
        <div class="initial-nav">
          <picture>
            <source
              srcset="/assets/images/tx_multi_services_group-160.webp 160w, /assets/images/tx_multi_services_group-320.webp 320w"
              sizes="(min-width: 1024px) 80px, (min-width: 640px) 64px, 48px"
              type="image/webp"
            />
            <img
              src="/assets/images/tx_multi_services_group-160.webp"
              alt=""
              width="80"
              height="80"
              decoding="async"
              fetchpriority="high"
            />
          </picture>
          <span>TGMSG</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
